<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="900" height="680" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">codebase — System Architecture</text>
  <text x="450" y="55" text-anchor="middle" fill="#8b949e" font-size="11">One command. Every AI tool understands your project instantly.</text>

  <!-- ── USER LAYER ────────────────────── -->
  <rect x="30" y="72" width="840" height="55" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="90" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="600" letter-spacing="1.5">USER INTERFACE</text>
  <rect x="55" y="100" width="100" height="22" rx="4" fill="#1f6feb" opacity="0.2" stroke="#1f6feb" stroke-width="0.5"/>
  <text x="105" y="115" text-anchor="middle" fill="#58a6ff" font-size="10">codebase CLI</text>
  <rect x="175" y="100" width="130" height="22" rx="4" fill="#1f6feb" opacity="0.2" stroke="#1f6feb" stroke-width="0.5"/>
  <text x="240" y="115" text-anchor="middle" fill="#58a6ff" font-size="10">Claude Code /vibeloop</text>
  <rect x="325" y="100" width="110" height="22" rx="4" fill="#1f6feb" opacity="0.2" stroke="#1f6feb" stroke-width="0.5"/>
  <text x="380" y="115" text-anchor="middle" fill="#58a6ff" font-size="10">MCP Server (18 tools)</text>
  <rect x="455" y="100" width="100" height="22" rx="4" fill="#1f6feb" opacity="0.2" stroke="#1f6feb" stroke-width="0.5"/>
  <text x="505" y="115" text-anchor="middle" fill="#58a6ff" font-size="10">Git Hooks</text>
  <rect x="575" y="100" width="130" height="22" rx="4" fill="#1f6feb" opacity="0.2" stroke="#1f6feb" stroke-width="0.5"/>
  <text x="640" y="115" text-anchor="middle" fill="#58a6ff" font-size="10">HTTP API / pipe</text>

  <!-- Arrow down -->
  <line x1="450" y1="127" x2="450" y2="148" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── SCANNER ENGINE ────────────────────── -->
  <rect x="30" y="150" width="840" height="105" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="170" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="600" letter-spacing="1.5">SCANNER ENGINE — 11 Parallel Detectors</text>

  <!-- Detectors row 1 -->
  <g font-size="9">
    <rect x="50" y="182" width="85" height="28" rx="4" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="0.5"/>
    <text x="92" y="195" text-anchor="middle" fill="#f0883e" font-weight="500">project</text>
    <text x="92" y="205" text-anchor="middle" fill="#8b949e" font-size="7">identity</text>

    <rect x="145" y="182" width="85" height="28" rx="4" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="0.5"/>
    <text x="187" y="195" text-anchor="middle" fill="#f0883e" font-weight="500">repo</text>
    <text x="187" y="205" text-anchor="middle" fill="#8b949e" font-size="7">git metadata</text>

    <rect x="240" y="182" width="85" height="28" rx="4" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="0.5"/>
    <text x="282" y="195" text-anchor="middle" fill="#f0883e" font-weight="500">structure</text>
    <text x="282" y="205" text-anchor="middle" fill="#8b949e" font-size="7">dirs, entries</text>

    <rect x="335" y="182" width="85" height="28" rx="4" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="0.5"/>
    <text x="377" y="195" text-anchor="middle" fill="#f0883e" font-weight="500">stack</text>
    <text x="377" y="205" text-anchor="middle" fill="#8b949e" font-size="7">langs, frameworks</text>

    <rect x="430" y="182" width="85" height="28" rx="4" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="0.5"/>
    <text x="472" y="195" text-anchor="middle" fill="#f0883e" font-weight="500">commands</text>
    <text x="472" y="205" text-anchor="middle" fill="#8b949e" font-size="7">build, dev, test</text>

    <rect x="525" y="182" width="95" height="28" rx="4" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="0.5"/>
    <text x="572" y="195" text-anchor="middle" fill="#f0883e" font-weight="500">dependencies</text>
    <text x="572" y="205" text-anchor="middle" fill="#8b949e" font-size="7">deps, licenses</text>

    <rect x="630" y="182" width="85" height="28" rx="4" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="0.5"/>
    <text x="672" y="195" text-anchor="middle" fill="#f0883e" font-weight="500">config</text>
    <text x="672" y="205" text-anchor="middle" fill="#8b949e" font-size="7">env, secrets 🔒</text>

    <rect x="725" y="182" width="85" height="28" rx="4" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="0.5"/>
    <text x="767" y="195" text-anchor="middle" fill="#f0883e" font-weight="500">quality</text>
    <text x="767" y="205" text-anchor="middle" fill="#8b949e" font-size="7">test, lint, CI</text>
  </g>

  <!-- Detectors row 2 -->
  <g font-size="9">
    <rect x="240" y="218" width="85" height="28" rx="4" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="0.5"/>
    <text x="282" y="231" text-anchor="middle" fill="#f0883e" font-weight="500">patterns</text>
    <text x="282" y="241" text-anchor="middle" fill="#8b949e" font-size="7">architecture</text>

    <rect x="335" y="218" width="85" height="28" rx="4" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="0.5"/>
    <text x="377" y="231" text-anchor="middle" fill="#f0883e" font-weight="500">api-docs</text>
    <text x="377" y="241" text-anchor="middle" fill="#8b949e" font-size="7">OpenAPI, gRPC</text>

    <rect x="430" y="218" width="85" height="28" rx="4" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="0.5"/>
    <text x="472" y="231" text-anchor="middle" fill="#f0883e" font-weight="500">git</text>
    <text x="472" y="241" text-anchor="middle" fill="#8b949e" font-size="7">commits, changes</text>
  </g>

  <!-- Promise.allSettled label -->
  <text x="665" y="232" fill="#484f58" font-size="8" font-style="italic">Promise.allSettled()</text>
  <text x="665" y="243" fill="#484f58" font-size="8" font-style="italic">failures = warnings, not crashes</text>

  <!-- Arrow down -->
  <line x1="450" y1="255" x2="450" y2="275" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── MANIFEST ────────────────────── -->
  <rect x="320" y="277" width="260" height="40" rx="6" fill="#238636" opacity="0.15" stroke="#238636" stroke-width="1"/>
  <text x="450" y="295" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">.codebase.json</text>
  <text x="450" y="309" text-anchor="middle" fill="#3fb950" font-size="9" opacity="0.7">~500 tokens • &lt;10KB • auto-updated by git hooks</text>

  <!-- Arrow down to outputs -->
  <line x1="350" y1="317" x2="180" y2="345" stroke="#30363d" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="450" y1="317" x2="450" y2="345" stroke="#30363d" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="550" y1="317" x2="720" y2="345" stroke="#30363d" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── OUTPUT LAYER ────────────────────── -->
  <!-- AI Tools -->
  <rect x="50" y="348" width="200" height="90" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="150" y="365" text-anchor="middle" fill="#a371f7" font-size="10" font-weight="600">AI Tool Integrations</text>
  <text x="65" y="382" fill="#8b949e" font-size="9">CLAUDE.md injection block</text>
  <text x="65" y="396" fill="#8b949e" font-size="9">.mcp.json (MCP server)</text>
  <text x="65" y="410" fill="#8b949e" font-size="9">Session-start hook</text>
  <text x="65" y="424" fill="#8b949e" font-size="9">Context-inject hook</text>

  <!-- GitHub -->
  <rect x="310" y="348" width="280" height="90" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="365" text-anchor="middle" fill="#f778ba" font-size="10" font-weight="600">GitHub Integration</text>
  <text x="325" y="382" fill="#8b949e" font-size="9">Issues, PRs, Milestones, Releases</text>
  <text x="325" y="396" fill="#8b949e" font-size="9">Priority ranking (P0 &gt; bug &gt; feature)</text>
  <text x="325" y="410" fill="#8b949e" font-size="9">Kanban board, effort estimation</text>
  <text x="325" y="424" fill="#f778ba" font-size="9" opacity="0.7">🔒 Circuit breaker + retry protected</text>

  <!-- Dev UX -->
  <rect x="650" y="348" width="200" height="90" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="750" y="365" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="600">Developer Experience</text>
  <text x="665" y="382" fill="#8b949e" font-size="9">11 skills (arch, security, etc.)</text>
  <text x="665" y="396" fill="#8b949e" font-size="9">7 slash commands</text>
  <text x="665" y="410" fill="#8b949e" font-size="9">agent-browser automation</text>
  <text x="665" y="424" fill="#8b949e" font-size="9">doctor + fix self-healing</text>

  <!-- Arrow down to resilience -->
  <line x1="450" y1="438" x2="450" y2="460" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── RESILIENCE LAYER ────────────────────── -->
  <rect x="30" y="462" width="840" height="75" rx="8" fill="#161b22" stroke="#da3633" stroke-width="1" stroke-opacity="0.4"/>
  <text x="450" y="480" text-anchor="middle" fill="#da3633" font-size="10" font-weight="600" letter-spacing="1.5">RESILIENCE LAYER</text>

  <g font-size="9">
    <rect x="55" y="490" width="160" height="36" rx="4" fill="#da3633" opacity="0.1" stroke="#da3633" stroke-width="0.5"/>
    <text x="135" y="505" text-anchor="middle" fill="#f85149" font-weight="500">Circuit Breaker</text>
    <text x="135" y="518" text-anchor="middle" fill="#8b949e" font-size="8">5 failures → open → 60s cooldown</text>

    <rect x="235" y="490" width="160" height="36" rx="4" fill="#da3633" opacity="0.1" stroke="#da3633" stroke-width="0.5"/>
    <text x="315" y="505" text-anchor="middle" fill="#f85149" font-weight="500">Exponential Backoff</text>
    <text x="315" y="518" text-anchor="middle" fill="#8b949e" font-size="8">retry + jitter for transient errors</text>

    <rect x="415" y="490" width="160" height="36" rx="4" fill="#da3633" opacity="0.1" stroke="#da3633" stroke-width="0.5"/>
    <text x="495" y="505" text-anchor="middle" fill="#f85149" font-weight="500">Secret Detection</text>
    <text x="495" y="518" text-anchor="middle" fill="#8b949e" font-size="8">20+ patterns, values never leaked</text>

    <rect x="595" y="490" width="160" height="36" rx="4" fill="#da3633" opacity="0.1" stroke="#da3633" stroke-width="0.5"/>
    <text x="675" y="505" text-anchor="middle" fill="#f85149" font-weight="500">Token Budget</text>
    <text x="675" y="518" text-anchor="middle" fill="#8b949e" font-size="8">auto-slim when context is too large</text>
  </g>

  <!-- ── AUTONOMOUS LOOP ────────────────────── -->
  <rect x="30" y="555" width="840" height="65" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1" stroke-opacity="0.4"/>
  <text x="450" y="573" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="600" letter-spacing="1.5">AUTONOMOUS LOOP — /vibeloop</text>

  <!-- Loop arrows -->
  <g font-size="10" font-weight="600">
    <rect x="100" y="585" width="130" height="26" rx="13" fill="#1f6feb" opacity="0.2" stroke="#1f6feb" stroke-width="0.5"/>
    <text x="165" y="602" text-anchor="middle" fill="#58a6ff">/simulate</text>

    <text x="258" y="602" text-anchor="middle" fill="#484f58" font-size="14">→</text>

    <rect x="280" y="585" width="110" height="26" rx="13" fill="#f0883e" opacity="0.2" stroke="#f0883e" stroke-width="0.5"/>
    <text x="335" y="602" text-anchor="middle" fill="#f0883e">/build</text>

    <text x="418" y="602" text-anchor="middle" fill="#484f58" font-size="14">→</text>

    <rect x="440" y="585" width="120" height="26" rx="13" fill="#3fb950" opacity="0.2" stroke="#3fb950" stroke-width="0.5"/>
    <text x="500" y="602" text-anchor="middle" fill="#3fb950">/launch</text>

    <text x="588" y="602" text-anchor="middle" fill="#484f58" font-size="14">→</text>

    <rect x="610" y="585" width="110" height="26" rx="13" fill="#a371f7" opacity="0.2" stroke="#a371f7" stroke-width="0.5"/>
    <text x="665" y="602" text-anchor="middle" fill="#a371f7">/review</text>

    <!-- Loop arrow back -->
    <path d="M 770 598 Q 810 598 810 615 Q 810 632 500 632 Q 100 632 100 615 Q 100 598 95 598" fill="none" stroke="#484f58" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-dim)"/>
  </g>

  <!-- Footer -->
  <text x="450" y="660" text-anchor="middle" fill="#484f58" font-size="9">Zero runtime dependencies • Node.js ≥20 • TypeScript strict • 519 tests • MIT License</text>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#30363d" stroke-width="1"/>
    </marker>
    <marker id="arrow-dim" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#484f58" stroke-width="1"/>
    </marker>
  </defs>
</svg>

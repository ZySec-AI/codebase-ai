name: Issue Triage

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  triage:
    if: |
      !contains(github.event.issue.labels.*.name, 'bot-skip') &&
      !contains(github.event.issue.labels.*.name, 'bot-reviewed')
    uses: ZySec-AI/.github/.github/workflows/_reusable-code-review.yml@develop
    secrets:
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      ORG_ADMIN_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
    with:
      mode: issue-triage

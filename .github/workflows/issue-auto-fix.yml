name: Issue Auto-Fix

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  fix:
    if: github.event.label.name == 'bot-fix-please'
    uses: ZySec-AI/.github/.github/workflows/_reusable-code-review.yml@develop
    secrets:
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      ORG_ADMIN_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
    with:
      mode: issue-fix
      fail_on: NEVER

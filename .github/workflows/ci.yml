name: CI

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run checks (typecheck + lint + format)
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify built output
        run: |
          test -f dist/index.js
          test -x dist/index.js

      - name: Verify MCP tool count in README
        run: |
          ACTUAL=$(grep -c "^    name:" src/mcp/server.ts)
          README_COUNT=$(grep -Eo '[0-9]+( tools)' README.md | grep -Eo '^[0-9]+' | head -1)
          [ "$ACTUAL" = "$README_COUNT" ] || { echo "README says $README_COUNT MCP tools, found $ACTUAL in TOOL_DEFINITIONS"; exit 1; }

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create test project
        run: |
          mkdir -p /tmp/test-project
          cd /tmp/test-project
          git init
          git config user.email "test@example.com"
          git config user.name "Test User"

      - name: Run scan on test project
        run: |
          node dist/index.js scan --path /tmp/test-project
          test -f /tmp/test-project/.codebase.json

      - name: Verify manifest is valid JSON
        run: |
          cat /tmp/test-project/.codebase.json | jq empty


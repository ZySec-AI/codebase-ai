name: Docs to Wiki

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'docs/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview changes without pushing to wiki'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  wiki:
    uses: ZySec-AI/.github/.github/workflows/_reusable-docs-to-wiki.yml@develop
    with:
      wiki_files: 'ARCHITECTURE.md,FEATURES.md,HOW-IT-WORKS.md,INTEGRATIONS.md,PRODUCT.md,USAGE.md'
      generate_sidebar: true
      dry_run: ${{ inputs.dry_run || false }}

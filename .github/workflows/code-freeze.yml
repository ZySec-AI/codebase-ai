name: Code Freeze Reminders

on:
  schedule:
    - cron: '0 8 * * 4'
    - cron: '0 2 * * 5'
  workflow_dispatch:
    inputs:
      type:
        description: 'soft or hard freeze reminder'
        required: true
        default: 'soft'
        type: choice
        options: [soft, hard]

permissions: {}

jobs:
  remind:
    uses: ZySec-AI/.github/.github/workflows/_reusable-code-freeze.yml@develop
    secrets: inherit
    with:
      freeze_type: ${{ inputs.type || '' }}

name: Security

on:
  push:
    branches: [develop, stage, release]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [develop, stage, release]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

jobs:
  scan:
    uses: ZySec-AI/.github/.github/workflows/_reusable-security.yml@develop
    with:
      auto_detect: true
      fast-mode: ${{ github.ref != 'refs/heads/release' && github.ref != 'refs/heads/stage' }}
    secrets: inherit

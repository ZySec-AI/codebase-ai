name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it. Please describe it clearly.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or use case that motivates this request.
      placeholder: "When I work on a monorepo, codebase can't..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Include examples if possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Detector (new language/framework detection)
        - Integration (new AI tool)
        - Command (new CLI command)
        - MCP (new MCP tool)
        - Skill (new slash command skill)
        - Documentation
        - Other
    validations:
      required: true
